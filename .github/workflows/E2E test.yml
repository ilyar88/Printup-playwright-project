name: Run PrintUp website tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Choose your browser'
        required: true
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Configuration_settings  # supplies credentials and env vars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          HEADLESS: 'true'
          URL: ${{ secrets.URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NEW_PASSWORD: ${{ secrets.NEW_PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APPLITOOLS_KEY: ${{ secrets.APPLITOOLS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx playwright test --config=configuration/playwright.config.js --project ${{ github.event.inputs.browser }}

      - name: Generate Allure report
        if: always()  # generate report even if tests fail
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.event.inputs.browser }}
          path: allure-report/
          retention-days: 30

  trigger-jenkins:
    needs: test
    runs-on: ubuntu-latest
    environment: Configuration_settings  # supplies Jenkins credentials
    steps:
      - name: Trigger Jenkins pipeline
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/printup/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASSWORD }}" \
            --data "BROWSER=${{ github.event.inputs.browser }}"

  load-test:
    needs: test  # runs after E2E tests complete
    runs-on: ubuntu-latest
    environment: Configuration_settings
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        uses: ./.github/actions/k6-load-test
        with:
          base_url: ${{ secrets.URL }}
