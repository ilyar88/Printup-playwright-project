name: Run PrintUp website testcases

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Choose your browser'
        required: true
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Configuration_settings  # supplies credentials and env vars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          HEADLESS: 'true'
          URL: ${{ secrets.URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NEW_PASSWORD: ${{ secrets.NEW_PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APPLITOOLS_KEY: ${{ secrets.APPLITOOLS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx playwright test --config=configuration/playwright.config.js --project ${{ github.event.inputs.browser }}

      - name: Generate Allure report
        if: always()  # generate report even if tests fail
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.event.inputs.browser }}
          path: allure-report/
          retention-days: 30

  trigger-jenkins:
    needs: test
    runs-on: ubuntu-latest
    environment: Configuration_settings  # supplies Jenkins credentials
    steps:
      - uses: actions/checkout@v4

      - name: Build Jenkins image
        run: docker build -t printup-jenkins .

      - name: Run Jenkins container
        env:
          URL: ${{ secrets.URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NEW_PASSWORD: ${{ secrets.NEW_PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APPLITOOLS_KEY: ${{ secrets.APPLITOOLS_KEY }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_PASSWORD: ${{ secrets.JENKINS_PASSWORD }}
        run: |
          docker run -d --name jenkins -p 8080:8080 \
            -e URL -e EMAIL -e PASSWORD -e NEW_PASSWORD -e APP_PASSWORD -e APPLITOOLS_KEY -e JENKINS_USER -e JENKINS_PASSWORD \
            -e CASC_JENKINS_CONFIG=/var/jenkins_config/casc.yaml \
            -v "${{ github.workspace }}/jenkins/casc.yaml:/var/jenkins_config/casc.yaml" \
            printup-jenkins

      - name: Wait for Jenkins to be ready
        run: timeout 120 bash -c 'until curl -sf http://localhost:8080/login >/dev/null; do sleep 2; done'

      - name: Run Jenkins pipeline and download report
        env:
          AUTH: ${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASSWORD }}
          BROWSER: ${{ github.event.inputs.browser }}
        run: bash .github/scripts/jenkins-pipeline.sh

      - name: Upload Jenkins playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-playwright-report-${{ github.event.inputs.browser }}
          path: jenkins-playwright-report/
          retention-days: 30

      - name: Upload Jenkins logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-diagnostics-${{ github.event.inputs.browser }}
          path: |
            jenkins-container.log
            jenkins-build-console.log
          retention-days: 30
          if-no-files-found: ignore

  load-test:
    needs: test  # runs after E2E tests complete
    runs-on: ubuntu-latest
    environment: Configuration_settings
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        uses: ./.github/actions/k6-load-test
        with:
          base_url: ${{ secrets.URL }}
