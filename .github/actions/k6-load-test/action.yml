name: k6 Load Test
description: Install k6 and run a load test script

inputs:
  script:
    description: Path to the k6 test script
    required: false
    default: k6/loadTest.js
  base_url:
    description: Base URL for the load test
    required: true

runs:
  using: composite
  steps:
    - name: Install k6
      shell: bash
      run: |
        sudo gpg -k
        # Add k6's official GPG key and apt repository
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
          --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
          | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run k6 load test
      shell: bash
      run: |
        mkdir -p allure-results
        k6 run --env BASE_URL=${{ inputs.base_url }} ${{ inputs.script }}

    - name: Generate Allure report
      if: always()  # generate report even if the load test fails
      shell: bash
      run: npx allure-commandline@2.37.0 generate allure-results --clean -o allure-report

    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: k6-allure-report
        path: allure-report/
        retention-days: 30
