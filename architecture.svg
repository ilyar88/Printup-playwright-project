<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="Segoe UI, Arial, sans-serif" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fb5"></stop>
      <stop offset="100%" style="stop-color:#0d4f8b"></stop>
    </linearGradient>
    <linearGradient id="grey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8a8a"></stop>
      <stop offset="100%" style="stop-color:#6a6a6a"></stop>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"></stop>
      <stop offset="100%" style="stop-color:#1a252f"></stop>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="660" fill="#f5f7fa" rx="12"></rect>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a252f" font-style="italic">Project Architecture</text>

  <!-- ==================== EXECUTION LAYER ==================== -->
  <text x="780" y="95" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a252f" font-style="italic">Execution</text>

  <!-- 2 boxes: 180px wide, 20px gap, centered at 450 → starts at 260 -->
  <rect x="260" y="75" width="180" height="38" rx="4" fill="url(#grey)" filter="url(#shadow)"></rect>
  <text x="350" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="white">GitHub Actions CI</text>

  <rect x="460" y="75" width="180" height="38" rx="4" fill="url(#grey)" filter="url(#shadow)"></rect>
  <text x="550" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="white">Local Execution</text>

  <!-- Divider line -->
  <line x1="40" y1="135" x2="860" y2="135" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="6,4"></line>

  <!-- ==================== TEST RESOURCES LAYER ==================== -->
  <text x="450" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" letter-spacing="3">TEST RESOURCES</text>

  <!-- 4 boxes: 170px wide, 20px gap, centered → starts at 80 -->
  <rect x="90" y="190" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="165" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="white">Test Suite</text>

  <rect x="270" y="190" width="170" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="355" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="white">ExcelReader</text>

  <rect x="460" y="190" width="170" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="545" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="white">Image Repository</text>

  <rect x="650" y="190" width="170" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="735" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="white">Config Files</text>

  <!-- Data Driven Testing: 370px centered at 450 -->
  <rect x="270" y="248" width="360" height="38" rx="4" fill="url(#dark)" filter="url(#shadow)"></rect>
  <text x="450" y="273" text-anchor="middle" font-size="14" font-weight="600" fill="white">Data Driven Testing</text>

  <!-- Divider line -->
  <line x1="40" y1="310" x2="860" y2="310" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="6,4"></line>

  <!-- ==================== BUSINESS INFRASTRUCTURE ==================== -->
  <text x="780" y="365" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a252f" font-style="italic">Business</text>
  <text x="780" y="390" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a252f" font-style="italic">Infrastructure</text>

  <!-- Workflows + Page Objects: 160px wide, starting at 100 -->
  <rect x="90" y="333" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="180" y="358" text-anchor="middle" font-size="14" font-weight="600" fill="white">Workflows</text>

  <rect x="90" y="383" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="180" y="408" text-anchor="middle" font-size="14" font-weight="600" fill="white">Page Objects</text>

  <!-- Fixtures label -->
  <text x="450" y="323" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">Fixtures / Utilities</text>

  <!-- Fixtures: 2x2 grid, 155px wide, 20px gap, starting at 295 -->
  <rect x="280" y="333" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="355" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="white">Assert</text>

  <rect x="465" y="333" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="547" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="white">Hooks</text>

  <rect x="280" y="383" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="355" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="white">User Interface</text>

  <rect x="465" y="383" width="160" height="38" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="547" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="white">Wait</text>

  <!-- Divider line -->
  <line x1="40" y1="445" x2="860" y2="445" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="6,4"></line>

  <!-- ==================== TECHNOLOGY LAYER ==================== -->
  <text x="450" y="480" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" letter-spacing="3">TECHNOLOGY STACK</text>

  <!-- Core Framework: 360px centered at 450 -->
  <rect x="270" y="498" width="360" height="42" rx="4" fill="url(#dark)" filter="url(#shadow)"></rect>
  <text x="450" y="525" text-anchor="middle" font-size="14" font-weight="600" fill="white">Core Framework</text>

  <!-- 5 boxes: 150px wide, 15px gap, centered → starts at 45 -->
  <rect x="45" y="565" width="150" height="42" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="120" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Playwright</text>

  <rect x="210" y="565" width="150" height="42" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="285" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Allure Report</text>

  <rect x="375" y="565" width="150" height="42" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="450" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Node.js</text>

  <rect x="540" y="565" width="150" height="42" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="615" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="white">MCP Server</text>

  <rect x="705" y="565" width="150" height="42" rx="4" fill="url(#blue)" filter="url(#shadow)"></rect>
  <text x="780" y="592" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Grafana k6</text>

  <!-- Vertical connectors from Core Framework to tech -->
  <line x1="450" y1="540" x2="120" y2="565" stroke="#8a8a8a" stroke-width="1.5"></line>
  <line x1="450" y1="540" x2="285" y2="565" stroke="#8a8a8a" stroke-width="1.5"></line>
  <line x1="450" y1="540" x2="450" y2="565" stroke="#8a8a8a" stroke-width="1.5"></line>
  <line x1="450" y1="540" x2="615" y2="565" stroke="#8a8a8a" stroke-width="1.5"></line>
  <line x1="450" y1="540" x2="780" y2="565" stroke="#8a8a8a" stroke-width="1.5"></line>

  <!-- Browser icons row -->
  <text x="450" y="642" text-anchor="middle" font-size="12" fill="#888">Chrome  |  Edge  |  Firefox</text>

</svg>